name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "Features"
    labels:
      - "enhancement"
      - "feature"
  - title: "Bug Fixes"
    labels:
      - "bug"
      - "fix"
  - title: "Dependencies"
    labels:
      - "dependencies"
  - title: "Documentation"
    labels:
      - "documentation"

change-template: "- $TITLE (#$NUMBER)"
change-title-escapes: "<*_&"

version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "enhancement"
      - "feature"
  patch:
    labels:
      - "bug"
      - "fix"
      - "dependencies"
      - "documentation"
  default: patch

template: |
  ## Changes

  $CHANGES
