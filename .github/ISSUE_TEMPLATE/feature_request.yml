name: Feature request
description: Suggest an idea for this project
labels:
  - enhancement
  - feature
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: What do you want to add or improve?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      placeholder: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe your proposed solution
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      placeholder: Who benefits and what workflow is improved?
  - type: checkboxes
    id: affected_areas
    attributes:
      label: Potentially affected areas
      options:
        - label: Backend/API
        - label: Frontend/UI
        - label: Database/migrations
        - label: Model loading/inference
        - label: Training workbench
        - label: Security/compliance
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: additional
    attributes:
      label: Additional context
