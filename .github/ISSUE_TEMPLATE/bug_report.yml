name: Bug report
description: Report a reproducible problem
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough details to reproduce.
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Short description of the bug
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Affected commit or version
      placeholder: e.g. main@abcdef1 or v0.1.0
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: backend
    attributes:
      label: Backend environment
      placeholder: OS, Python version, backend type, start command
  - type: input
    id: frontend
    attributes:
      label: Frontend environment
      placeholder: Node version, browser
  - type: textarea
    id: model_training
    attributes:
      label: Model or training context (if applicable)
      placeholder: Model name/source, format, GPU/CPU mode, trainer, dataset format
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Remove secrets, tokens, private paths, and personal data before sharing.
      render: shell
  - type: markdown
    attributes:
      value: |
        Security findings (auth bypass, SSRF, path traversal, credential exposure, RCE) must be reported privately via Security Advisories, not as public issues.
