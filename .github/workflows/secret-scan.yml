name: Secret Scan

"on":
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run secret scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Scan examples and docs for leaked secrets
        run: |
          python scripts/check_example_secrets.py

      - name: Run strict secret-scan review against latest snapshot
        run: |
          set -euo pipefail
          report_path="data/temp/secret-scan-review-ci.md"
          python scripts/review_secret_scan.py --strict --output "$report_path"

          if ! grep -q "Comment enforcement active: yes" "$report_path"; then
            echo "ERROR: Secret-scan review ran without snapshot-based comment enforcement."
            echo "Ensure at least one baseline report exists in docs/security/reports/."
            exit 1
          fi
